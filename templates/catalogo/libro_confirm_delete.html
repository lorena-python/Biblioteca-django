{% extends 'base.html' %}

{% block title %}Eliminar libro{% endblock %}

{% block content %}
<h1>Eliminar libro</h1>

<p>¿Seguro que deseas eliminar <strong>"{{ libro.titulo }}"</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'detalle_libro' libro.pk %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
